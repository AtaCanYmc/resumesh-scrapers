name: CD — Publish to PyPI

on:
  release:
    types: [published]

  # Manual trigger for testing the pipeline without a release
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ─── Build ────────────────────────────────────────────────────────────
  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify package
        run: |
          pip install dist/*.whl
          python -c "from resumesh_scrapers import __version__; print(f'Built v{__version__}')"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  # ─── Test the built package ───────────────────────────────────────────
  test-build:
    name: Test Built Package
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout Code (for tests)
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install from wheel
        run: |
          python -m pip install --upgrade pip
          pip install dist/*.whl
          pip install pytest pytest-asyncio pytest-cov respx

      - name: Run tests against installed package
        run: pytest tests/ -v

  # ─── Publish to PyPI ──────────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    needs: [build, test-build]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/resumesh-scrapers
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true
